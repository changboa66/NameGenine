name: NameGenie

options:
  bundleIdPrefix: com.zhangchangbao
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    from: 4.5.0

targets:
  NameGenie:
    type: application
    platform: iOS
    sources:
      - path: NameGenie
    dependencies:
      - package: Lottie
    settings:
      base:
        INFOPLIST_FILE: NameGenie/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zhangchangbao.NameGenie
        PRODUCT_NAME: NameGenie
        DEVELOPMENT_TEAM: "BJJSXN6S66"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        MARKETING_VERSION: "0.6"
        CURRENT_PROJECT_VERSION: "1"
    # iCloud/CloudKit disabled for now; will enable when sync is needed
    # entitlements:
    #   path: NameGenie/NameGenie.entitlements
    #   properties:
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.com.zhangchangbao.NameGenie
    #     com.apple.developer.icloud-services:
    #       - CloudKit
